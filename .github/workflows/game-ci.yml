name: Actions 😎

on: [push]

jobs:
  build:
    name: Build my project ✨
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # Cache
      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # Personal account: rely on UNITY_LICENSE file activation only.
      - name: Preflight activation inputs
        shell: bash
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -z "${UNITY_LICENSE}" ]; then
            echo "UNITY_LICENSE secret is missing or empty."
            exit 1
          fi
          if [[ "${UNITY_LICENSE}" != *"<License"* && "${UNITY_LICENSE}" != *"<Unity_v"* ]]; then
            echo "UNITY_LICENSE does not look like a valid .ulf payload."
            echo "Recreate UNITY_LICENSE from the full Unity .ulf content."
            exit 1
          fi

      # Test
      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          HOME: /github/home
          UNITY_SERIAL: ""
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # Upload test results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test results
          path: artifacts

      # Build
      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          HOME: /github/home
          UNITY_SERIAL: ""
        with:
          targetPlatform: WebGL

      # Output
      - uses: actions/upload-artifact@v4
        with:
          name: Build
          path: build
